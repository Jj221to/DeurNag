<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Data Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 2em; background-color: #f4f7f6; color: #333; }
        table { border-collapse: collapse; width: 100%; box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; text-align: left; padding: 12px; }
        thead { background-color: #007bff; color: white; }
        tbody tr:nth-child(even) { background-color: #f2f2f2; }
        tbody tr:hover { background-color: #e9ecef; }
        h1 { text-align: center; color: #0056b3; }
        p { text-align: center; }
    </style>
</head>
<body>

    <h1>Forex Data Dashboard</h1>
    <p>Displaying the last 24 hours of hourly data for EUR/USD.</p>

    <table>
        <thead>
            <tr>
                <th>Datetime</th>
                <th>Open</th>
                <th>High</th>
                <th>Low</th>
                <th>Close</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <!-- Data rows will be inserted here by JavaScript -->
            <tr>
                <td colspan="5" style="text-align: center;">Loading data...</td>
            </tr>
        </tbody>
    </table>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tableBody = document.getElementById('data-table-body');

            fetch('/api/data')
                .then(response => {
                    if (!response.ok) {
                        // Try to get error message from JSON response body
                        return response.json().then(err => {
                            throw new Error(err.error || `HTTP error! status: ${response.status}`);
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    // Clear the "Loading..." row
                    tableBody.innerHTML = '';

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    if (data.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No data available.</td></tr>`;
                        return;
                    }

                    // Populate the table
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        // Format numbers to 5 decimal places for currency
                        const open = parseFloat(row.open).toFixed(5);
                        const high = parseFloat(row.high).toFixed(5);
                        const low = parseFloat(row.low).toFixed(5);
                        const close = parseFloat(row.close).toFixed(5);

                        tr.innerHTML = `
                            <td>${row.datetime}</td>
                            <td>${open}</td>
                            <td>${high}</td>
                            <td>${low}</td>
                            <td>${close}</td>
                        `;
                        tableBody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error fetching or parsing data:', error);
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">Failed to load data: ${error.message}</td></tr>`;
                });
        });
    </script>
</body>
</html>
